<!DOCTYPE html>
<html>
<head>
  <title>Disaster Prediction Map</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <style>
    body { margin:0; }
    #map { height:100vh; width:100vw; }
  </style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map("map").setView([10.04, 76.35], 10);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

let heatLayer;

function updateMap() {
  fetch("/api/data")
    .then(res => res.json())
    .then(data => {
      let heat = [];

      for (let id in data) {
        let n = data[id];
        heat.push([n.lat, n.lon, n.probability / 100]);
      }

      if (heatLayer) map.removeLayer(heatLayer);

      heatLayer = L.heatLayer(heat, {
        radius: 35,
        blur: 20,
        gradient: {
          0.0: "green",
          0.4: "yellow",
          0.6: "orange",
          0.8: "red"
        }
      }).addTo(map);
    });
}

setInterval(updateMap, 4000);
updateMap();
</script>
</body>
</html>
