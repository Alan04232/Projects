<!DOCTYPE html>
<html>
<head>
    <title>IoT Node Alert Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body { margin:0; padding:0; }
        #map { height:100vh; width:100%; }
        .legend {
            background:white;
            padding:10px;
            line-height:18px;
            color:#333;
            font-size:14px;
        }
        .legend i {
            width:14px;
            height:14px;
            float:left;
            margin-right:8px;
            opacity:0.9;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Initialize map (center Kerala default)
    var map = L.map('map').setView([9.2, 76.5], 8);

    // OpenStreetMap layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var markers = {};

    function getColor(alert) {
        if (alert == 0) return "green";
        if (alert == 1) return "orange";
        return "red";
    }

    function updateMarkers(data) {
        data.forEach(node => {
            var color = getColor(node.alert);

            if (markers[node.node_id]) {
                markers[node.node_id].setLatLng([node.lat, node.lon]);
                markers[node.node_id].setStyle({color: color});
            } else {
                var marker = L.circleMarker([node.lat, node.lon], {
                    radius: 10,
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.8
                }).addTo(map);

                marker.bindPopup(
                    "<b>Node:</b> " + node.node_id + "<br>" +
                    "<b>Alert:</b> " + node.alert + "<br>" +
                    "<b>Lat:</b> " + node.lat + "<br>" +
                    "<b>Lon:</b> " + node.lon
                );

                markers[node.node_id] = marker;
            }
        });
    }

    function fetchData() {
        fetch("/api/nodes")
        .then(response => response.json())
        .then(data => {
            updateMarkers(data);
        })
        .catch(err => console.log(err));
    }

    // refresh every 3 seconds
    setInterval(fetchData, 3000);

    // initial load
    fetchData();
</script>

</body>
</html>
